AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FakeNewsOff Backend API

Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime: nodejs22.x
    Environment:
      Variables:
        NODE_ENV: production
        GROUNDING_ENABLED: 'true'
        GROUNDING_PROVIDER_ORDER: 'mediastack,gdelt,serper'
        GROUNDING_TIMEOUT_MS: '8000'
        GROUNDING_CACHE_TTL_SECONDS: '900'
        GROUNDING_MAX_RESULTS: '10'
        GROUNDING_MIN_SIMILARITY: '0.55'
        MEDIASTACK_API_KEY: ''
        MEDIASTACK_TIMEOUT_MS: '5000'
        SERPER_API_KEY: '29f649131ca610615bddf35d7b8c7d98f2947b5c'
        SERPER_TIMEOUT_MS: '5000'
        EVIDENCE_CACHE_TTL_MS: '600000'
        EVIDENCE_CACHE_STALE_TTL_MS: '1800000'
        GDELT_MIN_INTERVAL_MS: '5000'
        GDELT_TIMEOUT_MS: '3000'
        ITERATIVE_EVIDENCE_ORCHESTRATION_ENABLED: 'true'
        DEMO_MODE: 'false'
        LOG_LEVEL: 'info'
        BEDROCK_REGION: 'us-east-1'
        CLAUDE_MODEL_ID: 'anthropic.claude-3-haiku-20240307-v1:0'

Resources:
  FakeNewsOffApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        MaxAge: 300

  AnalyzeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: dist/lambda.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Events:
        AnalyzePost:
          Type: HttpApi
          Properties:
            ApiId: !Ref FakeNewsOffApi
            Path: /analyze
            Method: POST
        HealthGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref FakeNewsOffApi
            Path: /health
            Method: GET
        GroundingHealthGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref FakeNewsOffApi
            Path: /health/grounding
            Method: GET
        GroundingSelfTestPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref FakeNewsOffApi
            Path: /internal/grounding-selftest
            Method: POST

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${FakeNewsOffApi}.execute-api.${AWS::Region}.amazonaws.com'
  ApiId:
    Description: API Gateway ID
    Value: !Ref FakeNewsOffApi
